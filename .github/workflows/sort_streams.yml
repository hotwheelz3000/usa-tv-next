name: Weekly Speed Sort
on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
jobs:
  sort:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Sort streams by speed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/sort_streams_by_speed.py
